syntax = "proto3";
package kbo.game.v1;

message ActionRequest {
  int32 game_id = 1;
  int32 user_id = 2;
  int32 action_type = 3; // 1: 풀스윙, 2: 밀어치기, 3: 거르기, 4: 도루
  int32 target_zone = 4;
}

message GameStateResponse {
  int32 inning = 1;
  string phase = 2;
  int32 our_score = 3;
  int32 enemy_score = 4;
  repeated int32 inning_scores_away = 5;
  repeated int32 inning_scores_home = 6;
  bool base1 = 7;
  bool base2 = 8;
  bool base3 = 9;
  int32 out_count = 10;
  int32 strike = 11;
  int32 ball = 12;
}
